services:
  redis:
    image: redis:7
    container_name: codearena-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 3. Application Services
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: codearena-backend
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # Mapped to 5000 to match PORT=5000 in your server .env
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      # Inside the Docker network, Redis communicates on its default internal port (6379)
      REDIS_URL: redis://redis:6379
      JUDGE0_API_URL: http://host.docker.internal:2358
    volumes:
      - ./server:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codearena-client
    depends_on:
      - backend
    ports:
      # Mapped to 3000 to match your development setup
      - "3000:3000"
    env_file:
      - ./client/.env
    environment:
      # Matches exactly what is in your client .env for the browser to hit the host machine
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: codearena-admin
    depends_on:
      - backend
    ports:
      # Mapped to 5002 to perfectly match ADMIN_PORT=5002 in your admin .env
      - "5002:5002"
    env_file:
      - ./admin/.env
    environment:
      # Admin server needs to talk to the backend container internally via Docker DNS
      API_URL: http://backend:5000/api/v1 
    volumes:
      - ./admin:/app
      - /app/node_modules

volumes:
  redis_data: