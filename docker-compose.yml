version: '3.9'

services:
  redis:
    image: redis:7
    container_name: codearena-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: codearena-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

 
  backend:
    build:
      context: ./server
      dockerfile: docker/Dockerfile
    container_name: codearena-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codearena
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: codearena
      KAFKA_ENABLED: "true"
      DOCKER_SANDBOX_IMAGE: codearena-sandbox:latest
      EXECUTION_ENABLED: "true"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - ./server:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./server/.env

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: codearena-client
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5001
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
